eforms does not believe that this is the end of the world. This is a chance for the people to stand up, be vocal about the changes we want to see in the world, and to elect people who will be responsible for those changes.\u003c/p\u003e\n\u003cp\u003ePlease explore the site, read through the sections that interest you and even the ones that don't, because you may find a new perspective on an issue that you hadn't even considered.\u003c/p\u003e\n\u003cp\u003eIf you have any thoughts that you would like added or any changes that you want made, please either reach out and let us know, or go to the \u003ca href=\"https://github.com/meese-enterprises/modernreforms.org\"\u003eGitHub repository\u003c/a\u003e and make them yourself! We would love to hear from you, and we believe that every voice counts and every individual has a unique opinion to offer that has the potential to make a real difference in the world if it is shared with the right people.\u003c/p\u003e\n\u003cp\u003eLet's work together and save the world! 😄\u003c/p\u003e","note":{"id":"nh36z59hwz1hh7v05wijpxj","title":"Modern Reforms 🌱","desc":"Modern Reforms for the Modern World 🗺️","updated":1655664738492,"created":1595961348801,"custom":{"nav_order":0,"permalink":"/"},"fname":"about","type":"note","vault":{"fsPath":".","selfContained":true,"name":"modernreforms.org"},"contentHash":"b6d2ec87fc0dcc918b17b62862dac94e","links":[],"anchors":{"modern-reforms-for-the-modern-world-️":{"type":"header","text":"Modern Reforms for the Modern World 🗺️","value":"modern-reforms-for-the-modern-world-️","line":8,"column":0,"depth":3}},"children":[],"parent":null,"data":{},"body":"\n### Modern Reforms for the Modern World 🗺️\nAs you may well know, our world is at a tipping point in history on a level that has never before been possible. Climate change is even worse than we have been led to believe, currencies and markets around the globe are beginning to fail, and the world is beginning to look more and more like a dystopia.\
